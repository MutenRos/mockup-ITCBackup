<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda | Panel de Control</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" data-page="agenda"></aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header shared-header" data-title="Agenda" data-action-label="+ Nuevo Evento" data-action-href="#"></header>

        <div class="agenda-container">
            <!-- Calendar View -->
            <div class="calendar-card">
                <div class="calendar-header">
                    <h2 class="section-title" style="margin:0" id="currentMonthDisplay">Enero 2026</h2>
                    <div class="calendar-nav">
                        <button class="btn-small" id="prevMonth" style="background:transparent; border:1px solid var(--border)" aria-label="Mes anterior" title="Mes anterior">←</button>
                        <button class="btn-small" id="nextMonth" style="background:transparent; border:1px solid var(--border)" aria-label="Mes siguiente" title="Mes siguiente">→</button>
                    </div>
                </div>
                
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Content rendered by JS -->
                </div>
            </div>

            <!-- Upcoming Events Sidebar -->
            <div class="upcoming-list" id="upcomingEvents">
                <h3 class="section-title">Próximos Eventos</h3>
                <div class="event-item">
                    <div class="event-time">Cargando...</div>
                </div>
            </div>
        </div>
    </main>
    <script src="agenda.js"></script>
    <script src="sidebar.js"></script>
    <script src="header.js"></script>
    <script src="dashboard-data.js"></script>
</body>
</html>
