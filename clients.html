<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | Panel de Control</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" data-page="clientes"></aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header shared-header" data-title="Gestión de Clientes" data-action-label="+ Nuevo Cliente" data-action-href="#"></header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Empresa</th>
                        <th>Contacto</th>
                        <th>Email</th>
                        <th>Proyectos Activos</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="clientsRows">
                    <tr>
                        <td colspan="6">Cargando clientes...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
<script src="sidebar.js"></script>
<script src="header.js"></script>
<script src="dashboard-data.js"></script>
</html>
