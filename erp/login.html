<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Tech Consulting — Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            min-height:100vh;
            display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            padding:1rem;
        }
        .login-card {
            background:#fff; border-radius:16px; padding:2.5rem;
            width:100%; max-width:400px;
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
            animation: cardIn 0.4s ease;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }
        .logo {
            width:64px; height:64px; border-radius:16px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 1.5rem;
            box-shadow: 0 8px 24px rgba(102,126,234,0.35);
        }
        .logo i { font-size:1.75rem; color:#fff; }
        h1 { text-align:center; font-size:1.5rem; color:#1e293b; margin-bottom:0.3rem; font-weight:800; }
        .subtitle { text-align:center; color:#64748b; font-size:0.9rem; margin-bottom:2rem; }
        .form-group { margin-bottom:1.25rem; }
        .form-label { display:block; font-size:0.85rem; font-weight:600; color:#334155; margin-bottom:0.4rem; }
        .form-control {
            width:100%; padding:0.7rem 1rem; border:1.5px solid #e2e8f0; border-radius:8px;
            font-size:0.95rem; color:#1e293b; transition:border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus { outline:none; border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.15); }
        .btn-login {
            width:100%; padding:0.75rem; border:none; border-radius:8px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:#fff; font-size:1rem; font-weight:600; cursor:pointer;
            transition:opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 14px rgba(102,126,234,0.35);
        }
        .btn-login:hover { opacity:0.92; transform:translateY(-1px); }
        .btn-login:active { transform:scale(0.98); }
        .btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .error-msg {
            background:#fef2f2; color:#dc2626; border:1px solid #fecaca;
            border-radius:8px; padding:0.6rem 0.8rem; font-size:0.85rem;
            margin-bottom:1rem; display:none;
        }
        .footer { text-align:center; margin-top:1.5rem; font-size:0.8rem; color:#94a3b8; }
        .demo-hint {
            background:#f0f5ff; border:1px solid #c7d7ff; border-radius:8px;
            padding:0.6rem 0.8rem; font-size:0.8rem; color:#4a5568;
            margin-bottom:1.25rem; text-align:center;
        }
        .demo-hint code { background:#e2e8f0; padding:1px 5px; border-radius:3px; font-size:0.8rem; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .spin { display:inline-block; animation:spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><i class="bi bi-grid-1x2-fill"></i></div>
        <h1>Integra Tech Consulting</h1>
        <p class="subtitle">Sistema de Gestión Empresarial</p>

        <div class="error-msg" id="error"></div>

        <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <input class="form-control" type="text" id="username" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input class="form-control" type="password" id="password" placeholder="••••••" required>
            </div>
            <button class="btn-login" type="submit" id="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>

        <p class="footer">Integra Tech Consulting &copy; 2025</p>
        <div class="demo-hint" style="display:block;margin-top:1rem">
            <strong>Demo:</strong> usuario <code>admin</code> · contraseña <code>admin</code>
        </div>
    </div>

    <script>
    // MODO DEMO — sin backend. Credenciales: admin / admin
    async function doLogin(e) {
        e.preventDefault();
        const errEl = document.getElementById('error');
        const btn = document.getElementById('btn-login');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Verificando...';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        await new Promise(r => setTimeout(r, 400));

        if (username === 'admin' && password === 'admin') {
            localStorage.setItem('erp_session', 'demo-token');
            localStorage.setItem('erp_user', username);
            window.location.href = '../index.html';
        } else {
            errEl.textContent = 'Credenciales incorrectas (demo: admin / admin)';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión';
        }
    }

    // No autoredirect en demo
    </script>
</body>
</html>
