<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas | Panel de Control</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar" data-page="finanzas"></aside>

    <main class="main-content">
        <header class="header shared-header" data-title="Módulo de Finanzas" data-action-label="Calculadora de Presupuesto" data-action-href="new-project.html"></header>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">MRR</div><div class="stat-value" id="finMrr">€0</div><div class="stat-trend trend-up">+12% mensual</div></div>
            <div class="stat-card"><div class="stat-label">Margen</div><div class="stat-value" id="finMargin">0%</div><div class="stat-trend">Objetivo ≥ 30%</div></div>
            <div class="stat-card"><div class="stat-label">Caja proyectada</div><div class="stat-value" id="finCashWeeks">0 sem</div><div class="stat-trend">Sin alertas críticas</div></div>
        </div>

        <div class="table-container">
            <h2 class="section-title">Herramientas financieras</h2>
            <table>
                <thead><tr><th>Herramienta</th><th>Uso</th><th>Acción</th></tr></thead>
                <tbody>
                    <tr><td>Cuestionario + Presupuesto</td><td>Costeo por alcance</td><td><a href="new-project.html">Abrir</a></td></tr>
                    <tr><td>Clientes</td><td>Seguimiento por cuenta</td><td><a href="clients.html">Abrir</a></td></tr>
                    <tr><td>Dashboard</td><td>KPIs ejecutivos</td><td><a href="erp/index.html">Abrir</a></td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
<script src="sidebar.js"></script>
<script src="header.js"></script>
<script src="dashboard-data.js"></script>
</html>
