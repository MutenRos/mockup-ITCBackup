<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Integra Tech</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" data-page="dashboard"></aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header shared-header" data-title="Resumen General" data-profile="true"></header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Ingresos Mensuales</div>
                <div class="stat-value" id="kpiRevenue">€0</div>
                <div class="stat-trend trend-up">↑ 12% vs mes anterior</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Proyectos Activos</div>
                <div class="stat-value" id="kpiProjects">0</div>
                <div class="stat-trend">3 en fase final</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tickets Pendientes</div>
                <div class="stat-value" id="kpiTickets">0</div>
                <div class="stat-trend trend-down">↓ 2 nuevos hoy</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tasa de Conversión</div>
                <div class="stat-value" id="kpiConversion">0%</div>
                <div class="stat-trend trend-up">↑ 0.4% esta semana</div>
            </div>
        </div>

        <!-- Recent Projects -->
        <div class="table-container">
            <h2 class="section-title">Proyectos Recientes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Proyecto</th>
                        <th>Estado</th>
                        <th>Entrega</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="projectsRows">
                    <tr>
                        <td colspan="5">Cargando proyectos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
<script src="sidebar.js"></script>
<script src="header.js"></script>
<script src="dashboard-data.js"></script>
</html>
