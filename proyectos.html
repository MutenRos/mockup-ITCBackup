<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos | Panel de Control</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar" data-page="proyectos"></aside>

    <main class="main-content">
        <header class="header shared-header" data-title="Módulo de Proyectos" data-action-label="+ Nuevo Proyecto" data-action-href="new-project.html"></header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Proyectos Totales</div>
                <div class="stat-value">12</div>
                <div class="stat-trend">8 activos / 4 completados</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">En Riesgo</div>
                <div class="stat-value">2</div>
                <div class="stat-trend trend-down">Requieren seguimiento</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Módulos ERP disponibles</div>
                <div class="stat-value">4</div>
                <div class="stat-trend">Inventario, POS, Ventas, Acceso</div>
            </div>
        </div>

        <div class="table-container">
            <h2 class="section-title">Accesos rápidos de proyecto</h2>
            <table>
                <thead>
                    <tr><th>Recurso</th><th>Tipo</th><th>Acción</th></tr>
                </thead>
                <tbody>
                    <tr><td>Cuestionario maestro</td><td>Planificación</td><td><a href="new-project.html">Abrir</a></td></tr>
                    <tr><td>Suite ERP</td><td>Operación</td><td><a href="suite.html">Abrir</a></td></tr>
                    <tr><td>Inventario</td><td>ERP</td><td><a href="erp/inventario.html">Abrir</a></td></tr>
                    <tr><td>POS</td><td>ERP</td><td><a href="erp/pos.html">Abrir</a></td></tr>
                    <tr><td>Ventas</td><td>ERP</td><td><a href="erp/ventas.html">Abrir</a></td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
<script src="sidebar.js"></script>
<script src="header.js"></script>
</html>
